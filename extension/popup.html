<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Manager Connector</title>
  <style>
    body {
      margin: 0;
      min-width: 300px;
      font-family: Arial, sans-serif;
      background: #f5f6fb;
      color: #1f2937;
    }
    .wrap {
      padding: 14px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 18px;
    }
    p {
      margin: 0 0 10px;
      font-size: 13px;
      color: #374151;
    }
    .row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    button {
      border: none;
      border-radius: 6px;
      padding: 8px 10px;
      cursor: pointer;
      font-size: 13px;
    }
    #openDashboardBtn {
      background: #2563eb;
      color: white;
      flex: 1;
    }
    #testApiBtn {
      background: #e5e7eb;
      color: #111827;
    }
    #statusText {
      margin-top: 10px;
      font-size: 12px;
      min-height: 16px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Password Manager</h1>
    <p>
      This extension watches login forms and can send saved credentials to your backend.
    </p>
    <p><strong>Backend:</strong> <span id="backendUrl">http://localhost:3000</span></p>
    <div class="row">
      <button id="openDashboardBtn" type="button">Open Web Dashboard</button>
      <button id="testApiBtn" type="button">Test API</button>
    </div>
    <div id="statusText"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
